global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'account-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'account-service:8082' ]

  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'auth-service:8081' ]

  - job_name: 'transaction-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'transaction-service:8083' ]

  - job_name: 'customer-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'customer-service:8086' ]

  - job_name: 'otp-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'otp-service:8087' ]

  - job_name: 'audit-log-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'audit-log-service:8088' ]

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: [ 'notification-service:8084' ]